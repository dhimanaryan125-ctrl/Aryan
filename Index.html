<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Musary</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 30%, #2c3e50 0%, #000000 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            font-family: 'Georgia', serif;
        }

        /* The Moon */
        .moon {
            width: 150px;
            height: 150px;
            background: #f1f1f1;
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.4);
            margin-bottom: 50px;
        }

        /* Twinkling Stars */
        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px white;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .btn {
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 25px;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px white;
        }
    </style>
</head>
<body>
    <script>
        for (let i = 0; i < 100; i++) {
            let star = document.createElement('div');
            star.className = 'stars';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }
    </script>

    <div class="moon"></div>
    <h1>Under the same moon, I'm waiting...</h1>
    <a href="apology.html" class="btn">Please Hear Me Out, Musary</a>
</body>
</html>
