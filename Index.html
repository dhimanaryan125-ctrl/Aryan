<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Musary</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #02040a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Starry Background */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Glowing Moon */
        .moon {
            width: 180px;
            height: 180px;
            background: #fdfdfd;
            border-radius: 50%;
            box-shadow: 0 0 80px 20px rgba(255, 255, 255, 0.4), inset -20px -20px 40px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.5s ease;
            margin-bottom: 30px;
        }

        .moon:hover {
            transform: scale(1.1);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: 1px solid white;
            background: transparent;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div id="stars-container"></div>

    <div class="container">
        <div class="moon" onclick="window.location.href='apology.html'"></div>
        <h1>Even the moon looks lonely without you, Musary.</h1>
        <a href="apology.html" class="btn">Click the moon to hear me</a>
    </div>

    <script>
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }
    </script>
</body>
</html>
